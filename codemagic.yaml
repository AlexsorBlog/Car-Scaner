workflows:
  ios-testflight-build:
    name: Build iOS & Push to TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 60
    working_directory: mobile_app
    
    # ВИПРАВЛЕННЯ 2: Підключення API-ключа клієнта
    integrations:
      app_store_connect: "Car app" # <-- ЗАМІНІТЬ ЦЕ НА ТОЧНУ НАЗВУ КЛЮЧА
    
    environment:
      node: 22
      xcode: latest
      groups:
        - apple_credentials 
        
    # ВИПРАВЛЕННЯ 1: Правильний синтаксис для тригера гілки
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        
    scripts:
      - name: Install Dependencies
        script: npm install
        
      - name: Build Web App
        script: npm run build
        
      - name: Sync Capacitor to iOS
        script: npx cap sync ios
        
      - name: Build IPA and Auto-Sign
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
            
    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true