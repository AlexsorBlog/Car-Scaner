workflows:
  ios-testflight-build:
    name: Build iOS & Push to TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 60
    working_directory: mobile_app
    
    integrations:
      app_store_connect: "Car app" # Не забудьте вставити точну назву!
    
    environment:
      node: 22
      xcode: latest
        
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        
    scripts:
      - name: Install Dependencies
        script: npm install
        
      - name: Build Web App
        script: npm run build
        
      - name: Sync Capacitor to iOS
        script: npx cap sync ios
        
      # НОВИЙ ВАЖЛИВИЙ КРОК: Завантажуємо сертифікати через API-ключ
      - name: Set up Automatic Code Signing
        script: |
          app-store-connect fetch-signing-files $(xcode-project detect-bundle-id) \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
        
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
            
    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true