workflows:
  ios-testflight-build:
    name: Build iOS & Push to TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 60
    working_directory: mobile_app
    
    integrations:
      app_store_connect: "Car app" # <--- ВСТАВТЕ СЮДИ НАЗВУ ВАШОГО API-КЛЮЧА
    
    environment:
      node: 22
      xcode: latest
      vars:
        # ВСТАВТЕ ВАШ РЕАЛЬНИЙ BUNDLE ID ТУТ (наприклад: "com.йогокомпанія.carscanner")
        APP_BUNDLE_ID: "CarSense.com.ua" 
        
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        
    scripts:
      - name: Install Dependencies
        script: npm install
        
      - name: Build Web App
        script: npm run build
        
      - name: Sync Capacitor to iOS
        script: npx cap sync ios
        
      # НОВИЙ КРОК: Примусово змінюємо Bundle ID в усьому проекті Xcode через термінал Mac
      - name: Force Xcode Bundle ID (Bulletproof Fix)
        script: |
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $APP_BUNDLE_ID;/g" ios/App/App.xcodeproj/project.pbxproj
        
      - name: Set up Automatic Code Signing
        script: |
          keychain initialize
          # Явно просимо Apple сертифікат саме для вашого APP_BUNDLE_ID
          app-store-connect fetch-signing-files $APP_BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
        
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
            
    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true