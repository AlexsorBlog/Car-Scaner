workflows:
  ios-testflight-build:
    name: Build iOS & Push to TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 60
    working_directory: mobile_app
    
    integrations:
      app_store_connect: "Car app" # <-- Ваша назва API-ключа
    
    environment:
      node: 22
      xcode: latest
      
      # ОСЬ ЦЯ МАГІЯ ВИРІШУЄ ВСЕ:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: CarSense.com.ua # <--- ВПИШІТЬ СЮДИ РЕАЛЬНИЙ BUNDLE ID КЛІЄНТА
        
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        
    scripts:
      - name: Install Dependencies
        script: npm install
        
      - name: Build Web App
        script: npm run build
        
      - name: Sync Capacitor to iOS
        script: npx cap sync ios
        
      # Ніяких скриптів для ключів, sed чи Plutil! Codemagic вже все налаштував у фоні.
        
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
            
    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true