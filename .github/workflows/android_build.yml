name: Build Android APK
on:
  push:
    branches: [ main ] # Change this to your active development branch
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./mobile_app
        run: npm install

      - name: Build Web App
        working-directory: ./mobile_app
        run: npm run build

      - name: Sync Capacitor to Android
        working-directory: ./mobile_app
        run: npx cap sync android

      - name: Build APK with Gradle
        working-directory: ./mobile_app/android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: mobile_app/android/app/build/outputs/apk/debug/app-debug.apk